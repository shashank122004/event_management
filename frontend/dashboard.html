<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — GFG Club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Guard: redirect immediately if no token -->
  <script>
    if (!localStorage.getItem('gfg-token')) {
      window.location.replace('login.html');
    }
  </script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light gfg-navbar sticky-top">
    <div class="container-fluid px-4 px-lg-5">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <div class="brand-icon">G</div>
        <span class="brand-text"><span class="brand-gfg">GFG</span> <span class="brand-club">Club</span></span>
      </a>
      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-center gap-1 gap-lg-2">
          <li class="nav-item"><a class="nav-link nav-link-custom" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link nav-link-custom" href="#">Events</a></li>
          <li class="nav-item">
            <button class="btn theme-toggle-btn" id="themeToggle" aria-label="Toggle dark mode">
              <i class="bi bi-moon" id="themeIcon"></i>
            </button>
          </li>
          <li class="nav-item">
            <button class="btn btn-login" id="navSignOutBtn" type="button">Sign Out</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="auth-page d-flex align-items-start justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
          <div class="auth-card text-center">

            <!-- Avatar -->
            <div class="mb-4">
              <div class="brand-icon mx-auto" style="width:64px;height:64px;font-size:2rem;line-height:64px;">G</div>
            </div>

            <!-- Welcome -->
            <h1 class="auth-title" id="welcomeHeading">Welcome!</h1>
            <p class="auth-subtitle" id="roleLabel"></p>

            <hr style="border-color:var(--border-color);margin:1.5rem 0;" />

            <p class="auth-subtitle mb-4">You are signed in to GFG Club.</p>

            <button class="btn-auth-primary" id="mainSignOutBtn" type="button">
              <i class="bi bi-box-arrow-right me-2"></i>Sign Out
            </button>

          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      // Apply saved theme
      var savedTheme = localStorage.getItem('gfg-theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      var themeIcon = document.getElementById('themeIcon');
      if (themeIcon) themeIcon.className = savedTheme === 'dark' ? 'bi bi-sun' : 'bi bi-moon';

      // Populate welcome message
      var role   = localStorage.getItem('gfg-role') || 'user';
      var user   = {};
      try { user = JSON.parse(localStorage.getItem('gfg-user') || '{}'); } catch (e) {}

      var heading = document.getElementById('welcomeHeading');
      var label   = document.getElementById('roleLabel');
      if (heading) heading.textContent = 'Welcome, ' + (user.fullName || user.FullName || 'Member') + '!';
      if (label)   label.textContent   = role === 'admin' ? 'Admin Portal' : 'Participant Dashboard';

      // Sign-out handler
      function signOut() {
        localStorage.removeItem('gfg-token');
        localStorage.removeItem('gfg-role');
        localStorage.removeItem('gfg-user');
        window.location.href = 'login.html';
      }

      var navBtn  = document.getElementById('navSignOutBtn');
      var mainBtn = document.getElementById('mainSignOutBtn');
      if (navBtn)  navBtn.addEventListener('click', signOut);
      if (mainBtn) mainBtn.addEventListener('click', signOut);

      // Theme toggle
      var toggleBtn = document.getElementById('themeToggle');
      if (toggleBtn) {
        toggleBtn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme');
          var next    = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('gfg-theme', next);
          var icon = document.getElementById('themeIcon');
          if (icon) icon.className = next === 'dark' ? 'bi bi-sun' : 'bi bi-moon';
        });
      }
    }());
  </script>
</body>
</html>
